apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rifftrax-poster-sync-cache
  namespace: media
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rifftrax-poster-sync
  namespace: media
spec:
  schedule: "3 3 * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800  # 30 min; covers a full library scan
      template:
        spec:
          restartPolicy: Never
          volumes:
          - name: secrets
            emptyDir:
              medium: Memory
          - name: cache
            persistentVolumeClaim:
              claimName: rifftrax-poster-sync-cache
          initContainers:
          - name: vault-secrets
            # python:3.12-slim has urllib.request and json in stdlib — no extra
            # dependencies needed. Replaced curlimages/curl + grep/cut pipeline
            # which broke on escaped quotes and Vault JSON key ordering.
            image: python:3.12-slim
            command:
            - python3
            - -c
            - |
              import json, urllib.request, os
              req = urllib.request.Request(
                "http://vault.vault.svc.cluster.local:8200/v1/secret/data/resilience-lab/rifftrax-poster-sync",
                headers={"X-Vault-Token": os.environ["VAULT_TOKEN"]},
              )
              with urllib.request.urlopen(req) as r:
                d = json.load(r)["data"]["data"]
              open("/secrets/emby_host",    "w").write(d["emby_host"])
              open("/secrets/emby_api_key", "w").write(d["emby_api_key"])
              open("/secrets/library",      "w").write(d.get("library", "RiffTrax"))
            env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
            volumeMounts:
            - name: secrets
              mountPath: /secrets
          containers:
          - name: sync
            image: ghcr.io/madavigo/riff-poster-sync:0.2.0
            command:
            - sh
            - -c
            - |
              rifftrax-poster-sync sync \
                --host "$(cat /secrets/emby_host)" \
                --api-key "$(cat /secrets/emby_api_key)" \
                --library "$(cat /secrets/library)" \
                --cache-dir /cache
            volumeMounts:
            - name: secrets
              mountPath: /secrets
            - name: cache
              mountPath: /cache
            resources:
              requests:
                memory: 128Mi
                cpu: 100m
              limits:
                memory: 256Mi
                cpu: 250m
