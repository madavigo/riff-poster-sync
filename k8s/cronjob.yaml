apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rifftrax-poster-sync-cache
  namespace: media
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rifftrax-poster-sync
  namespace: media
spec:
  schedule: "3 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          volumes:
          - name: secrets
            emptyDir:
              medium: Memory
          - name: cache
            persistentVolumeClaim:
              claimName: rifftrax-poster-sync-cache
          initContainers:
          - name: vault-secrets
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              set -e
              secrets=$(curl -sf \
                -H "X-Vault-Token: ${VAULT_TOKEN}" \
                http://vault.vault.svc.cluster.local:8200/v1/secret/data/resilience-lab/rifftrax-poster-sync)
              echo "$secrets" | grep -o '"emby_host":"[^"]*"' | cut -d'"' -f4 > /secrets/emby_host
              echo "$secrets" | grep -o '"emby_api_key":"[^"]*"' | cut -d'"' -f4 > /secrets/emby_api_key
              echo "$secrets" | grep -o '"library":"[^"]*"' | cut -d'"' -f4 > /secrets/library
            env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
            volumeMounts:
            - name: secrets
              mountPath: /secrets
          containers:
          - name: sync
            image: ghcr.io/madavigo/riff-poster-sync:latest
            command:
            - sh
            - -c
            - |
              rifftrax-poster-sync sync \
                --host "$(cat /secrets/emby_host)" \
                --api-key "$(cat /secrets/emby_api_key)" \
                --library "$(cat /secrets/library)" \
                --cache-dir /cache
            volumeMounts:
            - name: secrets
              mountPath: /secrets
            - name: cache
              mountPath: /cache
            resources:
              requests:
                memory: 128Mi
                cpu: 100m
              limits:
                memory: 256Mi
                cpu: 250m
