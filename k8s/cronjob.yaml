apiVersion: batch/v1
kind: CronJob
metadata:
  name: rifftrax-poster-sync
  namespace: media
spec:
  schedule: "3 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "rifftrax-poster-sync"
            vault.hashicorp.com/agent-inject-secret-config: "secret/data/resilience-lab/rifftrax-poster-sync"
            vault.hashicorp.com/agent-inject-template-config: |
              {{- with secret "secret/data/resilience-lab/rifftrax-poster-sync" -}}
              export EMBY_HOST="{{ .Data.data.emby_host }}"
              export EMBY_API_KEY="{{ .Data.data.emby_api_key }}"
              export LIBRARY="{{ .Data.data.library }}"
              {{- end }}
        spec:
          restartPolicy: Never
          containers:
          - name: sync
            image: ghcr.io/madavigo/rifftrax-poster-sync:latest
            command:
            - /bin/sh
            - -c
            - |
              . /vault/secrets/config
              rifftrax-poster-sync sync \
                --host "$EMBY_HOST" \
                --api-key "$EMBY_API_KEY" \
                --library "$LIBRARY"
            resources:
              requests:
                memory: 128Mi
                cpu: 100m
              limits:
                memory: 256Mi
                cpu: 250m
